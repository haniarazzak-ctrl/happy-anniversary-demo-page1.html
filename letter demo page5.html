<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Love Letter 💌</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ffd1dc, #fff0f5);
      font-family: "Georgia", serif;
    }

    .letter {
      background: #fff;
      padding: 40px;
      max-width: 700px;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
      line-height: 1.8;
      font-size: 18px;
      color: #333;
      position: relative;
    }

    .letter h1 {
      text-align: center;
      color: #e75480;
      margin-bottom: 20px;
    }

    .heart {
      position: absolute;
      top: -20px;
      right: -20px;
      font-size: 40px;
    }
    .love-btn {
        background-color: #ffb6c1; /* baby pink */
        color: #fff;
        font-size: 20px;
        padding: 15px 40px;
        border: none;
        border-radius: 40px;
        cursor: pointer;
        display: block;
        margin: 30px auto 0;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      
      .love-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 12px 25px rgba(255, 182, 193, 0.8);
      }
      
  </style>
</head>

<body>

  <div class="letter">
    <div class="heart">💖</div>

    <h1>Your letter 💕</h1>

    <p>
       heading <br><br>

      your text here
    </p>
    <p style="text-align:right;">— Me 💖</p>

    <button class="love-btn" onclick="location.href='polaroids demo page6.html'">
        One last thing for you 💕
      </button>
      
  </div>

</body>
</html>
